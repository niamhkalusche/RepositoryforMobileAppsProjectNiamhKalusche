<!--- putting menu content into app.component.html as every page will need to use it 
as shown/explained here (https://www.designerkaran.com/2023/05/part-7-my-first-angular-15-ionic-7-app.html)
and incoporating this type of menu design where it comes in from the left(https://ionicframework.com/docs/api/menu)-->
<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item button [routerLink]="['/home']">Home</ion-item>
        <ion-item button [routerLink]="['/trending']">Trending</ion-item>
        <ion-item button [routerLink]="['/favourites']">Favourites</ion-item>
        <ion-item button [routerLink]="['/search']">Search</ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
